# Kanagawa-bones-brighter.conf
# A custom theme for Ghostty with a deeper purple background and brighter syntax.

# Main background and foreground colors
background = 28253a
foreground = d4be98

# Cursor and selection colors
cursor-color = f4d009
selection-foreground = 28253a
selection-background = ffffff

# The 16-color ANSI palette
# These are the colors used for text and terminal applications.
# Pallete order: black, red, green, yellow, blue, magenta, cyan, white
# The bright versions (8-15) are also defined.

# Normal colors (0-7)
palette = 0=1f1f28
palette = 1=c8413f
palette = 2=82a03d
palette = 3=c4b055
palette = 4=6580b0
palette = 5=93568c
palette = 6=4f958f
palette = 7=a5adce

# Bright colors (8-15) - these are your "brighter syntax" colors
palette = 8=51576d
palette = 9=e86f6a
palette = 10=a9c97b
palette = 11=e2c149
palette = 12=7191d9
palette = 13=9565b9
palette = 14=6fc3ba
palette = 15=ffffff
