set -g default-terminal "tmux-256color"
set -g mouse on
set -ag terminal-overrides ",xterm-256color:RGB"
set -g set-clipboard on
set -gq allow-passthrough on


unbind %
unbind '"'

set -g prefix C-b

# Split windows (opens in same directory as current pane)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"


unbind r
bind r source-file $HOME/.config/tmux/tmux.conf \; display-message "Tmux conifg reloaded"

bind -r m resize-pane -Z


# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Alt + number to select tmux window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Vim style copying
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

bind-key C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "zsh" # quick floating terminal
bind-key n command-prompt "new-session -s '%%'"

set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin "christoomey/vim-tmux-navigator"

set -g @plugin 'omerxx/tmux-sessionx' # default keybind "<prefix> O" to activate
set -g @plugin "tmux-plugins/tmux-resurrect" #persist tmux sessions after computer restart
set -g @plugin "tmux-plugins/tmux-continuum" #automatically save sessions every 15mins

# Configure Online status
set -g @online_icon "ok"
set -g @offline_icon "nok"
set -g @route_to_ping "1.1.1.1"

set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @sessionx-bind 'o'



# ==========================================
# Vesper Theme UI Configuration
# ==========================================

# Vesper color palette variables
set -g @thm_bg "#101010"
set -g @thm_black "#0A0A0A"
set -g @thm_gold "#FFC799"
set -g @thm_green "#00FF9C"
set -g @thm_teal "#00D4AA"
set -g @thm_white "#E8E8D0"
set -g @thm_dim "#3A3A2A"
set -g @thm_comment "#4A4A3A"

# Status bar base (Transparent background)
set -g status-position bottom
set -g status-style "bg=default"
set -g status-justify "absolute-centre"

# ── Status Left ──────────────────────────────────────────
set -g status-left-length 100
set -g status-left ""

# Session name (Fixed ternary commas by chaining brackets)
set -ga status-left "#{?client_prefix,#[bg=#{@thm_gold}]#[fg=#{@thm_bg}]#[bold]  #S ,#[bg=default]#[fg=#{@thm_green}]  #S }"

# Separator
set -ga status-left "#[bg=default,fg=#{@thm_dim}]│"

# Current path (Teal folder icon)
set -ga status-left "#[bg=default,fg=#{@thm_teal}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "

# Zoom indicator
set -ga status-left "#[bg=default,fg=#{@thm_dim}]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=#{@thm_gold}]#{?window_zoomed_flag,  zoom ,}"

# ── Status Center (Windows) ───────────────────────────────
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Inactive window (Dimmed text, transparent background)
set -g window-status-format " #I: #W "
set -g window-status-style "bg=default,fg=#{@thm_comment}"
set -g window-status-last-style "bg=default,fg=#{@thm_comment}"

# Active window (Solid Gold block to stand out)
set -g window-status-current-format " #I: #W "
set -g window-status-current-style "bg=#{@thm_gold},fg=#{@thm_bg},bold"

# Separator between windows
set -gF window-status-separator "#[bg=default,fg=#{@thm_dim}]│"

# Activity/Bell styles
set -g window-status-activity-style "bg=default,fg=#{@thm_green}"
set -g window-status-bell-style "bg=default,fg=#{@thm_gold},bold"

# ── Status Right ─────────────────────────────────────────
set -g status-right-length 100
set -g status-right ""

# Online status (Fixed ternary commas)
set -ga status-right "#[bg=default]#{?#{==:#{online_status},ok},#[fg=#{@thm_white}] 󰖩 on ,#[fg=#{@thm_gold}]#[bold]#[reverse] 󰖪 off }"

# ── Pane Borders ─────────────────────────────────────────
setw -g pane-border-style "bg=default,fg=#{@thm_dim}"
setw -g pane-active-border-style "bg=default,fg=#{@thm_gold}"

run '~/.config/tmux/.tmux/plugins/tpm/tpm'
