#######################################################################################
# VESPER AESTHETIC (updated rules syntax; deduped; conflict-free binds)
#######################################################################################

###################
### MY PROGRAMS ###
###################
$terminal    = ghostty
$fileManager = nautilus
$menu        = rofi -show drun
$mainMod     = SUPER

#################
### AUTOSTART ###
#################
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = kanshi & swaync & nm-applet
exec-once = hypridle
exec-once = hyprpaper
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

################
### HARDWARE ###
################
cursor {
    no_hardware_cursors = true
    no_break_fs_vrr = true
    min_refresh_rate = 60
}

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 1

    # Vesper gradient: Mint → Orange
    col.active_border = rgba(7fc4a3ee) rgba(ffa759ee) 45deg
    col.inactive_border = rgba(1e1e2eaa)

    layout = master
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 10
    screen_shader = /home/jae/.config/hypr/shaders/vibrant.glsl

    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 30
        render_power = 4
        color = rgba(00000099)
        offset = 0 12
    }

    blur {
        enabled = true
        size = 10
        passes = 4
        new_optimizations = true
        ignore_opacity = false
        vibrancy = 0.3
        vibrancy_darkness = 0.6
        special = true
        popups = true
    }

    dim_inactive = true
    dim_strength = 0.12
}

animations {
    enabled = true

    bezier = vesper,    0.16, 1,   0.3,  1
    bezier = vesperin,  0.05, 0.9, 0.1,  1.05
    bezier = vesperout, 0.7,  0,   0.84, 0

    animation = windowsIn,   1, 4, vesperin,  popin 70%
    animation = windowsOut,  1, 3, vesperout, popin 70%
    animation = windowsMove, 1, 4, vesper,    slide

    animation = fade,        1, 4, vesper
    animation = border,      1, 10, vesper
    animation = borderangle, 1, 40, vesper, loop
    animation = workspaces,  1, 5, vesperin, slide
}

master {
    new_status = master
    new_on_top = true
    mfact = 0.60
    orientation = left
    allow_small_split = false
    smart_resizing = true
}

misc {
    vrr = 1
    vfr = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    focus_on_activate = true

    disable_hyprland_logo = true
    disable_splash_rendering = true

    enable_swallow = true
    swallow_regex = ^(ghostty|kitty|Alacritty)$

    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    layers_hog_keyboard_focus = true
}


input {
    kb_layout = us
    repeat_rate = 40
    repeat_delay = 200
	kb_options = ctrl:nocaps

    sensitivity = 0
    accel_profile = flat
    force_no_accel = true

    follow_mouse = 1
    mouse_refocus = false
    float_switch_override_focus = 2

    touchpad {
        natural_scroll = false
        scroll_factor = 0.5
        clickfinger_behavior = true
        tap-to-click = true
        drag_lock = true
    }
}
gestures {
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.5
}

###################
### KEYBINDINGS ###
###################
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, ~/.config/hypr/scripts/yazi.sh
bind = $mainMod, W, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, exec, pkill kanshi; sleep 0.5; kanshi &
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1

# Master layout controls
bind = $mainMod, SPACE, layoutmsg, swapwithmaster
bind = $mainMod, J, layoutmsg, cyclenext
bind = $mainMod, K, layoutmsg, cycleprev
bind = $mainMod, Tab, layoutmsg, cyclenext
bind = $mainMod SHIFT, Tab, layoutmsg, cycleprev
bind = $mainMod, O, layoutmsg, orientationnext
bind = $mainMod, I, layoutmsg, addmaster
bind = $mainMod, D, layoutmsg, removemaster

# Resizing
bind = $mainMod, H, resizeactive, -60 0
bind = $mainMod, L, resizeactive,  60 0
bind = $mainMod SHIFT, H, resizeactive, 0 -60
bind = $mainMod SHIFT, L, resizeactive, 0  60

# Special workspace (scratch)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Pin
bind = $mainMod, A, pin

# Screenshot (moved off SUPER+SHIFT+S to avoid collision)
bind = , Page_Up, exec, hyprshot -m region

# Clipboard picker
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Refresh rate toggles
bind = $mainMod, F9, exec, hyprctl keyword monitor "eDP-1, 2560x1600@60, auto, 1" && notify-send "Display" "60Hz"
bind = $mainMod SHIFT, F9, exec, hyprctl keyword monitor "eDP-1, 2560x1600@240, auto, 1" && notify-send "Display" "240Hz"

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1
bind = $mainMod CTRL, L, workspace, e+1
bind = $mainMod CTRL, H, workspace, e-1

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp,  exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown,exec, brightnessctl -e4 -n2 set 5%-

bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

#####################
### WORKSPACE RULES ###
#####################
# Smart gaps / no gaps when only (selectors are supported)
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1],   gapsout:0, gapsin:0
# (If you want to ignore special workspaces, the wiki shows how to add s[false].) :contentReference[oaicite:2]{index=2}

###################
### WINDOW RULES ###
###################
# NOTE: New syntax is props (match:*) + effects; evaluated top-to-bottom. :contentReference[oaicite:3]{index=3}

# Core stability
windowrule = match:class .*, suppress_event maximize
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_initial_focus on

# Terminal transparency
windowrule = match:class (com.mitchellh.ghostty), opacity 0.92 0.88
windowrule = match:class (kitty), opacity 0.92 0.88

# Pavucontrol
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, size 800 600
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, center on

# Common floaters
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(org.gnome.Calculator)$, float on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:title ^(Volume Control)$, float on

# File pickers (best-effort; titles vary per toolkit)
windowrule = match:title ^(Open File)$, float on
windowrule = match:title ^(Save File)$, float on
windowrule = match:title ^(Save As)$, float on

# Picture-in-Picture
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, size (monitor_w*0.30) (monitor_h*0.30)
windowrule = match:title ^(Picture-in-Picture)$, move (monitor_w-window_w-20) (monitor_h-window_h-20)

# Smart gaps: remove border/rounding when only one tiled window is visible on workspace selector
windowrule = match:float 0, match:workspace w[tv1], border_size 0
windowrule = match:float 0, match:workspace w[tv1], rounding 0
windowrule = match:float 0, match:workspace f[1],   border_size 0
windowrule = match:float 0, match:workspace f[1],   rounding 0
# This pattern is shown in the workspace rules docs. :contentReference[oaicite:4]{index=4}

# Floating styling
windowrule = match:float 1, border_size 1
windowrule = match:float 1, rounding 10

# Workspace assignments
windowrule = match:class ^(firefox)$,  workspace 2 silent
windowrule = match:class ^(discord|vesktop)$, workspace 3 silent
windowrule = match:class ^(Spotify)$, workspace 4 silent

# Idle inhibit
windowrule = match:class ^(mpv)$, idle_inhibit always

# App opacity
windowrule = match:class ^(Code|code-url-handler)$, opacity 0.90 0.85
windowrule = match:class ^(Spotify)$,              opacity 0.88 0.82

#################
### LAYER RULES ###
#################
# Layer rules use the same idea: match:namespace + effects. :contentReference[oaicite:5]{index=5}
layerrule = match:namespace waybar,         blur on
layerrule = match:namespace waybar,         ignore_alpha 0.0
layerrule = match:namespace rofi,           blur on
layerrule = match:namespace rofi,           ignore_alpha 0.0
layerrule = match:namespace notifications,  blur on
