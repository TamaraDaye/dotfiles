###################
### MY PROGRAMS ###
###################
$terminal    = ghostty
$fileManager = nautilus
$menu        = rofi -show drun
$mainMod     = SUPER

#################
### AUTOSTART ###
#################
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpaper & waybar
exec-once = kanshi & swaync & nm-applet
exec-once = hypridle
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = GDK_BACKEND, wayland
env = SDL_VIDEODRIVER, wayland 
env = MOZ_ENABLE_WAYLAND, 1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = WLR_NO_HARDWARE_CURSORS, 1
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_THEME, Adwaita
env = NVD_BACKEND, direct
env = OZONE_PLATFORM, wayland
env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1
env = WLR_DRM_NO_ATOMIC,1

################
### HARDWARE ###
################
cursor {
    no_hardware_cursors = 1
    no_break_fs_vrr = true
    min_refresh_rate = 240
	no_warps = false
}

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 4
    gaps_out = 5 
    border_size = 1

    # Vesper gradient: Mint → Orange
    col.active_border = rgba(7fc4a3ee) rgba(ffa759ee) 45deg
    col.inactive_border = rgba(1e1e2eaa)

    layout = scrolling
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 5
    screen_shader = /home/jae/.config/hypr/shaders/vibrant.glsl

    active_opacity = 1.0
    inactive_opacity = 0.93

    shadow {
        enabled = true
        range = 30
        render_power = 4
        color = rgba(00000099)
        offset = 0 12
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = false
        vibrancy = 0.15
        vibrancy_darkness = 0.4
        special = true
        popups = true
		xray = false
    }

    dim_inactive = true
    dim_strength = 0.01
}

scrolling {
	fullscreen_on_one_column = true
	column_width = 0.5
	direction = right
}

animations {
    enabled = true

    bezier = vesper,    0.16, 1,   0.3,  1
    bezier = vesperin,  0.05, 0.9, 0.1,  1.05
    bezier = vesperout, 0.7,  0,   0.84, 0

    animation = windowsIn,   1, 4, vesperin,  popin 70%
    animation = windowsOut,  1, 3, vesperout, popin 70%
    animation = windowsMove, 1, 4, vesper,    slide

    animation = fade,        1, 4, vesper
    animation = border,      1, 10, vesper
    animation = borderangle, 1, 40, vesper, loop
    animation = workspaces,  1, 6, default, slidevert
}


misc {
    vfr = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    focus_on_activate = true

    disable_hyprland_logo = true
    disable_splash_rendering = true

    enable_swallow = true
    swallow_regex = ^(ghostty|kitty|Alacritty)$

    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    layers_hog_keyboard_focus = true
}



input {
    kb_layout = us
    repeat_rate = 40
    repeat_delay = 200
	kb_options = ctrl:nocaps

    sensitivity = 0
    accel_profile = flat
    force_no_accel = true

    follow_mouse = 1
    mouse_refocus = false
    float_switch_override_focus = 2

    touchpad {
        natural_scroll = true
        scroll_factor = 0.5
        clickfinger_behavior = true
        tap-to-click = true
		disable_while_typing = true
    }
}
gestures {
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.5
}
xwayland {
	force_zero_scaling = true
}

###################
### KEYBINDINGS ###
###################
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, W, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, exec, pkill kanshi; sleep 0.5; kanshi &
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1

# Scrolling layout controls
bind = $mainMod, h, layoutmsg, focus l
bind = $mainMod, l, layoutmsg, focus r
bind = $mainMod, j, layoutmsg, focus d
bind = $mainMod, k, layoutmsg, focus u
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod, p, layoutmsg, promote
bind = $mainMod, TAB, layoutmsg, swapcol l

# Special workspace (scratch)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Pin
bind = $mainMod, A, pin

# Screenshot (moved off SUPER+SHIFT+S to avoid collision)
bind = , Page_Up, exec, hyprshot -m region

# Clipboard picker
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Refresh rate toggles
bind = $mainMod, F9, exec, hyprctl keyword monitor "eDP-1, 2560x1600@60, auto, 1" && notify-send "Display" "60Hz"
bind = $mainMod SHIFT, F9, exec, hyprctl keyword monitor "eDP-2, 2560x1600@240, auto, 1" && notify-send "Display" "240Hz"

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1
bind = $mainMod CTRL, L, workspace, e+1
bind = $mainMod CTRL, H, workspace, e-1

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp,  exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown,exec, brightnessctl -e4 -n2 set 5%-

bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

#####################
### WORKSPACE RULES ###
#####################
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

#####################
### WINDOW RULES ###
#####################
windowrule =  float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = size 800 600, match:class ^(org.pulseaudio.pavucontrol)$
windowrule =  float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = size 900 600, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = suppress_event maximize, match:class .*
windowrule = workspace 3, match:class ^(discord)$
windowrule = workspace 3, match:class ^(Spotify)$
windowrule = workspace 2, match:class ^(ONLYOFFICE)$
windowrule = workspace 1, match:class ^(brave-browser)$
windowrule = workspace 4, match:class ^(Windscribe)$
windowrule = size 200 200, match:class ^(Windscribe)$
windowrule = workspace 4, match:class ^(org.qbittorrent.qBittorrent)$
windowrule =  float on, match:class ^(Windscribe)$
