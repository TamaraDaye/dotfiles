general {
	disable_loading_bar = true
	hide_cursor = true
}


background {
	monitor = 
	path = /home/jae/wallpaper/nagzul.jpg
	blur_passes = 2
	blur_size = 4
	vibrancy = 0.1696
}

# Clock
label {
    monitor =

    text = $TIME
    color = rgba(255, 255, 255, 0.9)
    font_size = 96
    font_family = Inter Bold
    shadow_passes = 1
    shadow_size   = 4
    shadow_color  = rgba(0, 0, 0, 0.3)

    position = 0, 120
    halign   = center
    valign   = center
}


# Date underneath the clock
label {
    monitor =

    text = cmd[update:60000] date +"%A, %B %d"
    color = rgba(255, 199, 153, 0.75)    # vesper orange, muted
    font_size = 18
    font_family = Inter

    position = 0, 30
    halign   = center
    valign   = center
}

# "enter password" label above the input field
label {
    monitor =

    text = enter password
    color = rgba(255, 255, 255, 0.35)
    font_size = 13
    font_family = Inter
    letter_spacing = 3                    # small tracking for a clean look

    position = 0, -88
    halign   = center
    valign   = center
}


input-field {
    monitor =

    size = 280, 52
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(ffc799, 0.45) rgba(99ffe4, 0.45) 135deg   # softened opacity
    inner_color = rgba(255, 255, 255, 0.04)                       # barely-there fill
    font_color  = rgb(255, 255, 255)

    fade_on_empty  = true
    fade_timeout   = 1200

    placeholder_text = <span foreground='#ffffff40'>enter password</span>

    rounding = 8

    check_color = rgba(99ffe4, 0.9) rgba(ffc799, 0.9) 135deg
    fail_color  = rgba(ff6e6e, 0.9) rgba(ffaa6e, 0.9) 90deg
    fail_text   = <i>wrong password</i>
    fail_timeout = 2000

    shadow_passes = 0

    position = 0, -20
    halign   = center
    valign   = center
}
