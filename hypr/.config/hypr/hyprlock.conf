# ==============================================================================
# VESPER HYPRLOCK THEME
# ==============================================================================

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# BACKGROUND
background {
    monitor =
    # OPTION 1: Use a screenshot of your current desktop with blur
    path = screenshot
    
    # OPTION 2: Use your specific wallpaper (Replace path!)
    # path = /home/jae/Pictures/wallpapers/my_wallpaper.png

    # OPTION 3: Solid Vesper Black (Fallback)
    color = rgba(16, 16, 16, 1.0)

    # Blur effect (makes the screenshot look like frosted glass)
    blur_passes = 2 
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME (Big Gold Clock)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M%p")"
    color = rgba(255, 199, 153, 1.0) # Vesper Gold (#FFC799)
    font_size = 120
    font_family = DepartureMono Nerd Font ExtraBold
    position = 0, -100
    halign = center
    valign = top
    shadow_passes = 5
    shadow_size = 10
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"- %A, %B %d -")</span>"
    color = rgba(240, 240, 240, 1.0) # Vesper White
    font_size = 18
    font_family = DepartureMono Nerd Font
    position = 0, -280
    halign = center
    valign = top
}

# USER GREETING (Optional - Delete if you want it cleaner)
label {
    monitor =
    text =    $USER
    color = rgba(156, 172, 255, 1.0) # Vesper Blue (#9CACFF)
    font_size = 14
    font_family = DepartureMono Nerd Font
    position = 0, -320
    halign = center
    valign = top
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    
    # Vesper Styling
    outer_color = rgba(255, 199, 153, 1.0) # Vesper Gold Border
    inner_color = rgba(28, 28, 28, 1.0)    # Dark Grey Background
    font_color = rgba(240, 240, 240, 1.0)  # White Text
    
    fade_on_empty = false
    placeholder_text = <span foreground="##505050"><i>Password...</i></span>
    
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
    
    # Validation Colors
    check_color = rgba(153, 255, 228, 1.0) # Vesper Green (Checking)
    fail_color = rgba(255, 93, 98, 1.0)    # Vesper Red (Wrong)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    
    capslock_color = rgba(255, 199, 153, 1.0)
}
